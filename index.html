<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── MUIS LIVE FETCHER ENGINE ────────────────────────────────────────────────
// Uses the MUIS public search API (JSON) with a multi-proxy fallback chain.
// Proxy chain: corsproxy.io → allorigins → codetabs → direct (last resort)

const PROXY_CHAIN = [
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

async function proxyFetch(targetUrl, timeoutMs = 10000) {
  let lastErr = null;
  for (const buildProxy of PROXY_CHAIN) {
    const proxyUrl = buildProxy(targetUrl);
    try {
      const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(timeoutMs) });
      if (!resp.ok) { lastErr = new Error(`HTTP ${resp.status}`); continue; }
      const ct = resp.headers.get("content-type") || "";
      // allorigins wraps in {contents, status}; others return raw
      if (proxyUrl.includes("allorigins")) {
        const json = await resp.json();
        return json.contents || "";
      }
      // codetabs and corsproxy return raw body
      return await resp.text();
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error("All proxies failed");
}

// MUIS exposes a public REST search used by their directory page.
// Endpoint: /api/HalalCertifiedEstablishment/Search
// Returns JSON array directly — no HTML parsing needed.
async function fetchMuisData(searchQuery) {
  if (!searchQuery || searchQuery.trim().length < 2) return [];
  const trimmed = searchQuery.trim();

  // ── Strategy 1: MUIS public JSON API ──────────────────────────────────────
  const apiUrl = `https://www.muis.gov.sg/api/HalalCertifiedEstablishment/Search?searchText=${encodeURIComponent(trimmed)}&pageSize=30&pageNumber=1`;
  try {
    const raw = await proxyFetch(apiUrl, 10000);
    if (raw) {
      // Strip BOM / leading whitespace
      const clean = raw.replace(/^\uFEFF/, "").trim();
      // corsproxy may return JSON directly
      if (clean.startsWith("[") || clean.startsWith("{")) {
        const parsed = JSON.parse(clean);
        const arr = Array.isArray(parsed) ? parsed : (parsed.data || parsed.results || parsed.items || []);
        if (arr.length > 0) {
          return arr.map(item => classifyResult({
            name:        item.EstablishmentName || item.name || item.Name || item.businessName || "",
            address:     item.Address || item.address || item.premiseAddress || "",
            certNo:      item.CertificateNo || item.certNo || item.CertNo || item.certificateNumber || "",
            expiryDate:  formatApiDate(item.ExpiryDate || item.expiryDate || item.ValidTill || item.validTill || ""),
            status:      item.Status || item.status || item.CertStatus || "Active",
          })).filter(r => r.name);
        }
      }
    }
  } catch (_) { /* fall through to HTML strategy */ }

  // ── Strategy 2: Scrape the HTML directory page ────────────────────────────
  const pageUrl = `https://www.muis.gov.sg/Halal/Halal-Certificate-Sembelihan-Certificates/Certification-Directory?searchText=${encodeURIComponent(trimmed)}`;
  const html = await proxyFetch(pageUrl, 12000);
  if (!html) throw new Error("Empty response from all proxies");

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");
  const results = [];

  // 2a: Table rows
  doc.querySelectorAll("table tbody tr").forEach(row => {
    const cells = Array.from(row.querySelectorAll("td")).map(c => c.textContent.trim());
    if (cells.length >= 3 && cells[0].length > 2) {
      results.push(classifyResult({
        name: cells[0], address: cells[1] || "", certNo: cells[2] || "",
        expiryDate: cells[3] || "", status: cells[4] || "Active",
      }));
    }
  });

  // 2b: JSON embedded in <script> tags
  if (results.length === 0) {
    doc.querySelectorAll("script").forEach(s => {
      const txt = s.textContent || "";
      [
        /(?:var|let|const)\s+\w+\s*=\s*(\[[\s\S]{10,}?\]);/g,
        /:\s*(\[[\s\S]{10,}?\])/g,
      ].forEach(re => {
        let m;
        while ((m = re.exec(txt)) !== null && results.length === 0) {
          try {
            const arr = JSON.parse(m[1]);
            if (!Array.isArray(arr) || arr.length === 0) return;
            const first = arr[0];
            if (typeof first !== "object") return;
            arr.forEach(item => {
              const name = item.EstablishmentName || item.name || item.Name || "";
              if (!name) return;
              results.push(classifyResult({
                name, address: item.Address || item.address || "",
                certNo: item.CertificateNo || item.certNo || "",
                expiryDate: formatApiDate(item.ExpiryDate || item.expiryDate || ""),
                status: item.Status || item.status || "Active",
              }));
            });
          } catch (_) {}
        }
      });
    });
  }

  // 2c: "no results" detection
  const bodyText = (doc.body?.textContent || "").toLowerCase();
  if (results.length === 0 && (
    bodyText.includes("no result") || bodyText.includes("no record") || bodyText.includes("not found")
  )) return [];

  return results;
}

function formatApiDate(raw) {
  if (!raw) return "";
  // ISO format: 2024-06-30T00:00:00 → 30/06/2024
  const iso = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[3]}/${iso[2]}/${iso[1]}`;
  return raw;
}

function classifyResult({ name, address, certNo, expiryDate, status }) {
  let certStatus = "valid";
  const rawStatus = (status || "").toLowerCase();

  if (rawStatus.includes("expir") || rawStatus.includes("invalid") || rawStatus.includes("cancel")) {
    certStatus = "expired";
  } else if (expiryDate) {
    // Check if expiring within 60 days
    const parts = expiryDate.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if (parts) {
      const [, d, m, y] = parts;
      const fullYear = y.length === 2 ? "20" + y : y;
      const expDate = new Date(`${fullYear}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`);
      const now = new Date();
      const diffDays = (expDate - now) / (1000 * 60 * 60 * 24);
      if (diffDays < 0) certStatus = "expired";
      else if (diffDays < 60) certStatus = "expiring";
    }
  }

  return {
    id: Math.random().toString(36).slice(2),
    name: name.replace(/\s+/g, " ").trim(),
    address: address.replace(/\s+/g, " ").trim(),
    certNo: certNo.replace(/\s+/g, " ").trim(),
    expiryDate: expiryDate.trim(),
    certStatus,
  };
}

// ─── QUICK FILTER PILLS ──────────────────────────────────────────────────────
const QUICK_PILLS = [
  { label: "McDonald's", icon: "🍟" },
  { label: "Subway", icon: "🥖" },
  { label: "KFC", icon: "🍗" },
  { label: "Encik Tan", icon: "🍜" },
  { label: "Stuff'd", icon: "🌯" },
  { label: "Marrybrown", icon: "🍔" },
  { label: "Old Chang Kee", icon: "🥟" },
  { label: "Bengawan Solo", icon: "🍰" },
];

// ─── SKELETON LOADER ─────────────────────────────────────────────────────────
function SkeletonCard() {
  return (
    <div className="skeleton-card">
      <div className="skel skel-title" />
      <div className="skel skel-badge" />
      <div style={{height:1, background:"var(--border)", margin:"10px 0"}} />
      <div className="skel skel-line w80" />
      <div className="skel skel-line w60" />
      <div style={{display:"flex", gap:8, marginTop:10}}>
        <div className="skel skel-meta" />
        <div className="skel skel-meta" />
      </div>
    </div>
  );
}

// ─── RESULT CARD ─────────────────────────────────────────────────────────────
function ResultCard({ item, onCopy }) {
  const [copied, setCopied] = useState(false);

  const handleCopy = () => {
    const text = `${item.name}\n${item.address}`;
    navigator.clipboard?.writeText(text).catch(() => {});
    setCopied(true);
    onCopy?.();
    setTimeout(() => setCopied(false), 2000);
  };

  const statusConfig = {
    valid: { label: "✓ Certified", cls: "status-valid" },
    expiring: { label: "⚠ Expiring Soon", cls: "status-expiring" },
    expired: { label: "✕ Expired", cls: "status-expired" },
  };
  const sc = statusConfig[item.certStatus] || statusConfig.valid;

  const expiryClass = item.certStatus === "expired" ? "danger" : item.certStatus === "expiring" ? "warn" : "";

  return (
    <div className="result-card">
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8}}>
        <div className="card-name">{item.name || "—"}</div>
        <span className={`status-badge ${sc.cls}`} style={{flexShrink:0}}>{sc.label}</span>
      </div>

      <div className="card-divider" />

      <div className="card-addr-row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{color:"#94a3b8",marginTop:2,flexShrink:0}}>
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span className="addr-text">{item.address || "Address not available"}</span>
        {item.address && (
          <button className={`copy-btn ${copied ? "copied" : ""}`} onClick={handleCopy}>
            {copied ? (
              <><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied</>
            ) : (
              <><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy</>
            )}
          </button>
        )}
      </div>

      <div className="meta-row">
        <div className="meta-chip">
          <span className="meta-label">Cert No.</span>
          <span className="meta-value">{item.certNo || "—"}</span>
        </div>
        <div className="meta-chip">
          <span className="meta-label">Expiry</span>
          <span className={`meta-value ${expiryClass}`}>{item.expiryDate || "—"}</span>
        </div>
      </div>
    </div>
  );
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function Toast({ message, show }) {
  return <div className={`toast ${show ? "show" : ""}`}>{message}</div>;
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [hasSearched, setHasSearched] = useState(false);
  const [activeFilter, setActiveFilter] = useState(null);
  const [toast, setToast] = useState({ show: false, msg: "" });
  const inputRef = useRef(null);
  const debounceRef = useRef(null);
  const abortRef = useRef(null);

  const showToast = (msg) => {
    setToast({ show: true, msg });
    setTimeout(() => setToast({ show: false, msg: "" }), 1800);
  };

  const runSearch = useCallback(async (searchTerm) => {
    if (!searchTerm || searchTerm.trim().length < 2) {
      setResults([]);
      setHasSearched(false);
      setError(null);
      return;
    }
    setLoading(true);
    setError(null);
    setHasSearched(true);
    try {
      const data = await fetchMuisData(searchTerm);
      setResults(data);
    } catch (e) {
      console.error(e);
      setError(e.message || "Network error");
      setResults([]);
    } finally {
      setLoading(false);
    }
  }, []);

  const handleInputChange = (e) => {
    const val = e.target.value;
    setQuery(val);
    setActiveFilter(null);
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => runSearch(val), 600);
  };

  const handlePillClick = (label) => {
    if (activeFilter === label) {
      setActiveFilter(null);
      setQuery("");
      setResults([]);
      setHasSearched(false);
      return;
    }
    setActiveFilter(label);
    setQuery(label);
    runSearch(label);
    inputRef.current?.blur();
  };

  const handleClear = () => {
    setQuery("");
    setResults([]);
    setHasSearched(false);
    setError(null);
    setActiveFilter(null);
    clearTimeout(debounceRef.current);
    inputRef.current?.focus();
  };

  const handleRetry = () => {
    if (query.trim()) runSearch(query);
  };

  return (
    <div className="app-shell">
      {/* STICKY HEADER */}
      <div className="sticky-top">
        <div className="header-gradient">
          <div className="header-inner">
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <div>
                <div className="header-brand">
                  <span>🕌</span>
                  <span>Halal Check SG</span>
                </div>
                <div className="header-sub">Powered by MUIS Official Registry</div>
              </div>
              <div className="halal-badge">
                <span className="dot-pulse" />
                Live Data
              </div>
            </div>
          </div>
        </div>

        {/* SEARCH BAR */}
        <div className="search-bar-wrap">
          <div className="search-input-row">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2.2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              ref={inputRef}
              type="text"
              placeholder="Search eatery, stall, or chain…"
              value={query}
              onChange={handleInputChange}
              autoComplete="off"
              autoCapitalize="words"
            />
            {query.length > 0 && (
              <button className="clear-btn" onClick={handleClear} aria-label="Clear search">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#64748b" strokeWidth="2.5">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            )}
          </div>
        </div>

        {/* FILTER PILLS */}
        <div className="pills-wrap">
          <div className="pills-row">
            {QUICK_PILLS.map((p) => (
              <button
                key={p.label}
                className={`pill ${activeFilter === p.label ? "active" : ""}`}
                onClick={() => handlePillClick(p.label)}
              >
                <span>{p.icon}</span>
                <span>{p.label}</span>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* SCROLLABLE BODY */}
      <div className="scroll-body">

        {/* LOADING SKELETONS */}
        {loading && (
          <>
            <div className="results-count">Searching MUIS registry…</div>
            {[1,2,3].map(i => <SkeletonCard key={i} />)}
          </>
        )}

        {/* ERROR BANNER */}
        {!loading && error && (
          <div className="info-banner">
            <div className="emoji">📡</div>
            <h3>All Proxies Unreachable</h3>
            <p>The app tried 3 CORS proxies (corsproxy.io → allorigins → codetabs) but all failed. This is usually temporary — please retry in a moment.</p>
            <button className="retry-btn" onClick={handleRetry}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
              Retry Search
            </button>
            <div style={{marginTop:14, padding:"10px 12px", background:"#f8fafc", borderRadius:10, textAlign:"left"}}>
              <p style={{fontSize:11, color:"#64748b", margin:"0 0 6px", fontWeight:600}}>Or search directly on MUIS:</p>
              <a href={`https://www.muis.gov.sg/Halal/Halal-Certificate-Sembelihan-Certificates/Certification-Directory?searchText=${encodeURIComponent(query)}`} target="_blank" rel="noopener noreferrer" style={{fontSize:12, color:"var(--emerald)", fontWeight:600, textDecoration:"none", display:"flex", alignItems:"center", gap:5}}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                Open MUIS Registry →
              </a>
            </div>
            <p style={{fontSize:10, color:"#cbd5e1", marginTop:10, marginBottom:0}}>Debug: {error}</p>
          </div>
        )}

        {/* NO RESULTS */}
        {!loading && !error && hasSearched && results.length === 0 && (
          <div className="info-banner">
            <div className="emoji">🔍</div>
            <h3>No Results Found</h3>
            <p>No Halal-certified eateries matched "<strong>{query}</strong>" in the MUIS registry. Try a different keyword or check the spelling.</p>
            <button className="retry-btn" onClick={() => { handleClear(); inputRef.current?.focus(); }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
              Clear & Try Again
            </button>
          </div>
        )}

        {/* RESULTS FEED */}
        {!loading && !error && results.length > 0 && (
          <>
            <div className="results-count">
              {results.length} result{results.length !== 1 ? "s" : ""} found
            </div>
            {results.map((item, idx) => (
              <ResultCard
                key={item.id || idx}
                item={item}
                onCopy={() => showToast("📋 Address copied!")}
              />
            ))}
            <div className="muis-link">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Data source: <a href="https://www.muis.gov.sg/Halal" target="_blank" rel="noopener noreferrer">MUIS Official Registry</a>
            </div>
          </>
        )}

        {/* WELCOME STATE */}
        {!loading && !error && !hasSearched && (
          <div className="welcome-banner">
            <div className="icon">🕌</div>
            <h3>Verify Halal Status Instantly</h3>
            <p>Search any restaurant, hawker stall, or food chain to check their MUIS Halal certification status, validity, and certificate details in real-time.</p>
            <div style={{marginTop:14, display:"flex", flexWrap:"wrap", gap:6, justifyContent:"center"}}>
              {["Hawker Centre", "Shopping Mall", "Fast Food"].map(tag => (
                <span key={tag} style={{
                  background:"#d1fae5", color:"#065f46",
                  fontSize:11, fontWeight:600, padding:"4px 10px",
                  borderRadius:20
                }}>{tag}</span>
              ))}
            </div>
          </div>
        )}
      </div>

      <Toast message={toast.msg} show={toast.show} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
